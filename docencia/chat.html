<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat privado</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 20px auto;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 6px;
    }

    .sub {
      color: #666;
      margin-bottom: 16px;
    }

    #chatBox {
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      height: 420px;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 14px;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .user {
      align-self: flex-end;
      background: #2563eb;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .admin {
      align-self: flex-start;
      background: #e5e7eb;
      color: #111827;
      border-bottom-left-radius: 4px;
    }

    .meta {
      font-size: 12px;
      opacity: 0.8;
      margin-bottom: 4px;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .row input {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    .row button {
      padding: 12px 18px;
      font-size: 16px;
      border: none;
      background: #16a34a;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1 id="titulo">Chat</h1>
  <div class="sub">Conversación privada</div>

  <div id="chatBox"></div>

  <div class="row">
    <input id="mensaje" type="text" placeholder="Escribe tu mensaje..." />
    <button onclick="enviarMensaje()">Enviar</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import {
      getFirestore,
      doc,
      setDoc,
      collection,
      addDoc,
      onSnapshot,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // PEGA AQUÍ TU CONFIG DE FIREBASE
    const firebaseConfig = {
    apiKey: "AIzaSyCJbMCUmcBf_AyeFmrTMOHY_ajRE7rgBlk",
    authDomain: "alejandro-estrada.firebaseapp.com",
    projectId: "alejandro-estrada",
    storageBucket: "alejandro-estrada.firebasestorage.app",
    messagingSenderId: "692972700859",
    appId: "1:692972700859:web:ad2ce2f2f73647f440959e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const chatId = params.get("chat");
    const userName = params.get("name") || "Usuario";

    if (!chatId) {
      alert("No se encontró el chat.");
      throw new Error("Falta chatId");
    }

    document.getElementById("titulo").textContent = `Chat de ${userName}`;

    const chatRef = doc(db, "chats", chatId);
    const mensajesRef = collection(db, "chats", chatId, "mensajes");

    // Crear/actualizar documento principal del chat
    await setDoc(chatRef, {
      userName,
      createdAt: Date.now(),
      updatedAt: Date.now()
    }, { merge: true });

    function formatearHora(ts) {
      if (!ts) return "";
      const d = new Date(ts);
      return d.toLocaleString("es-MX");
    }

    function renderizar(snapshot) {
      const chatBox = document.getElementById("chatBox");
      chatBox.innerHTML = "";

      snapshot.forEach((docSnap) => {
        const data = docSnap.data();
        const div = document.createElement("div");
        div.className = `msg ${data.sender === "admin" ? "admin" : "user"}`;

        div.innerHTML = `
          <div class="meta"><strong>${data.sender === "admin" ? "Admin" : userName}</strong> · ${formatearHora(data.createdAt)}</div>
          <div>${data.text}</div>
        `;

        chatBox.appendChild(div);
      });

      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Escuchar mensajes en tiempo real
    const q = query(mensajesRef, orderBy("createdAt", "asc"));
    onSnapshot(q, renderizar);

    window.enviarMensaje = async function () {
      const input = document.getElementById("mensaje");
      const text = input.value.trim();

      if (!text) return;

      await addDoc(mensajesRef, {
        sender: "user",
        text,
        createdAt: Date.now()
      });

      await setDoc(chatRef, {
        userName,
        updatedAt: Date.now()
      }, { merge: true });

      input.value = "";
    };

    document.getElementById("mensaje").addEventListener("keydown", (e) => {
      if (e.key === "Enter") enviarMensaje();
    });
  </script>
</body>
</html>
